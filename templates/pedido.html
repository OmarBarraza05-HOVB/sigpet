<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<title>Realizar pedido | SIGPET</title>

</head>

<body>

<header>

<h1>SIGPET</h1>

<nav>
<a href="/">Inicio</a>
<a href="/menu">Menú</a>
<a href="/consultar">Consultar pedido</a>
</nav>

</header>

<main>

<div class="card">

<h2>Realizar pedido</h2>

<form action="/confirmacion" method="post">

<label>Nombre:</label>
<input type="text" name="nombre" required>

<br><br>

<label>Platillo:</label>

<select name="platillo">

<option>Tacos</option>
<option>Hamburguesa</option>
<option>Hotdog</option>
<option>Refresco</option>

</select>

<br><br>

<label>Cantidad:</label>
<input type="number" name="cantidad" min="1" required>

<br><br>

<button type="submit" class="btn-principal">Enviar pedido</button>

</form>

</div>

</main>

<footer>

<p>SIGPET — Sistema de gestión de pedidos</p>

</footer>

</body>

</html>
